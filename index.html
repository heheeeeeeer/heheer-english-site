    <style>
        /* 自定义一些动画效果 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .paper {
            background: #fffdfa;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            border: 1px solid #f4e3ea;
        }
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
            font-weight: 700;
            letter-spacing: 0.06em;
        }
        .bg-animated::before, .bg-animated::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 12s ease-in-out infinite;
        }
        .bg-animated::before {
            width: 300px; height: 300px;
            background: radial-gradient(circle at center, rgba(236,72,153,0.4), transparent 60%);
            top: 120px; left: 10%;
        }
        .bg-animated::after {
            width: 360px; height: 360px;
            background: radial-gradient(circle at center, rgba(59,130,246,0.35), transparent 60%);
            bottom: 80px; right: 12%;
            animation-delay: 3s;
        }
        @keyframes float {
            0%,100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-20px) translateX(10px); }
        }
        .orb { position: fixed; width: 280px; height: 280px; border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; }
        .orb.pink { background: radial-gradient(circle at center, rgba(236,72,153,0.35), transparent 60%); }
        .orb.blue { background: radial-gradient(circle at center, rgba(59,130,246,0.3), transparent 60%); }
    </style>

    <!-- 底部趣味动画 -->

        .cat-track { position: relative; height: 36px; }
        .cat { position: absolute; left: -5%; bottom: 0; font-size: 14px; animation: catWalk 20s linear infinite; white-space: nowrap; }
        @keyframes catWalk { 0% { left: -5%; transform: scaleX(1);} 100% { left: 105%; transform: scaleX(1);} }
        .sparkle { position: fixed; font-size: 22px; pointer-events: none; animation: sparkleFly 1500ms ease-out forwards; }
        @keyframes sparkleFly { 
          0% { transform: translate(0,0) scale(1); opacity: 1;}
          100% { transform: translate(var(--dx), var(--dy)) scale(0.8); opacity: 0;}
        }
    </style>

    <!-- 赞助 弹窗 -->
    <!-- 去掉灰色遮罩，保留弹窗 -->

    <script>
        const donationPopover = document.getElementById('donationPopover');
        function toggleDonationModal() {
            const isHidden = donationPopover.classList.contains('hidden');
            if (isHidden) {
                donationPopover.classList.remove('hidden');
                setTimeout(() => donationPopover.classList.remove('opacity-0'), 10);
            } else {
                donationPopover.classList.add('opacity-0');
                setTimeout(() => donationPopover.classList.add('hidden'), 300);
            }
        }
        document.addEventListener('click', (e) => {
            const wrap = document.getElementById('donationWrap');
            const open = !donationPopover.classList.contains('hidden');
            if (open && wrap && !wrap.contains(e.target)) {
                toggleDonationModal();
            }
        });
        // 鼠标互动背景
        const orbs = Array.from(document.querySelectorAll('.orb'));
        let mx = window.innerWidth/2, my = window.innerHeight/2;
        let ox = mx, oy = my;
        function animate() {
            ox += (mx - ox) * 0.08;
            oy += (my - oy) * 0.08;
            orbs.forEach((orb, i) => {
                const dx = (i === 0 ? -120 : 120);
                const dy = (i === 0 ? -80 : 80);
                orb.style.transform = `translate(${ox + dx}px, ${oy + dy}px)`;
            });
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('mousemove', (e) => {
            mx = e.clientX;
            my = e.clientY;
        });
        // 双击 ✨ 效果
        window.addEventListener('dblclick', (e) => {
            for (let i = 0; i < 14; i++) {
                const s = document.createElement('span');
                s.className = 'sparkle';
                s.textContent = '✨';
                const dx = (Math.random()*80 - 40) + 'px';
                const dy = (Math.random()*50 - 25) + 'px';
                s.style.left = e.clientX + 'px';
                s.style.top = e.clientY + 'px';
                s.style.setProperty('--dx', dx);
                s.style.setProperty('--dy', dy);
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1600);
            }
        });
    </script>
